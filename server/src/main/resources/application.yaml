spring:
  application:
    name: crm

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/mydatabase
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: crm

  jackson:
    deserialization:
      fail-on-null-for-primitives: false
      fail-on-unknown-properties: false
    serialization:
      fail-on-empty-beans: false
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:c3JtLWNvbmNlcHQtc2VjcmV0LWtleS0yMDI2LXByb2R1Y3Rpb24tc2VjdXJl}
  expiration: 86400000

logging:
  level:
    com.concept.crm: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.orm.deprecation: ERROR
